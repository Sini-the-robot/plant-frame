<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="21600">
<title>Flora · Reykjavik</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111110;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  .layout {
    display: flex;
    width: 100vw;
    height: 100vh;
  }

  /* تصویر — سمت چپ */
  .image-zone {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #1a1a15;
  }

  .image-zone img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  .image-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    background: #1a1a15;
    z-index: 2;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 1.5px solid #333;
    border-top-color: #5a7a5a;
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner-text {
    font-size: 0.6rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.15em;
    color: #444;
    text-transform: uppercase;
  }

  /* پنل اطلاعات — سمت راست، عرض ثابت */
  .info-panel {
    width: 380px;
    min-width: 380px;
    background: #f0ebe0;
    display: flex;
    flex-direction: column;
    border-left: 1px solid #c8c0b0;
    position: relative;
    height: 100vh;
    overflow: hidden;
  }

  .info-panel::before {
    content: '';
    position: absolute;
    top: 20px; right: 20px;
    width: 16px; height: 16px;
    border-top: 1.5px solid #1a1a18;
    border-right: 1.5px solid #1a1a18;
  }
  .info-panel::after {
    content: '';
    position: absolute;
    bottom: 20px; left: 20px;
    width: 16px; height: 16px;
    border-bottom: 1.5px solid #1a1a18;
    border-left: 1.5px solid #1a1a18;
  }

  .panel-header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid #c8c0b0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    color: #8a8478;
  }

  .panel-date {
    font-size: 0.58rem;
    font-family: 'Space Mono', monospace;
    color: #8a8478;
  }

  .weather-grid {
    padding: 1.2rem 2rem;
    border-bottom: 1px solid #c8c0b0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    background: rgba(255,255,255,0.5);
    flex-shrink: 0;
  }

  .weather-item { display: flex; flex-direction: column; gap: 0.2rem; }

  .weather-label {
    font-size: 0.5rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #8a8478;
  }

  .weather-value {
    font-size: 1rem;
    font-weight: 300;
    color: #1a1a18;
  }

  .plant-section {
    padding: 2rem 2rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }

  .plant-latin {
    font-size: 2.2rem;
    font-style: italic;
    font-weight: 300;
    line-height: 1.15;
    color: #1a1a18;
    margin-bottom: 0.4rem;
  }

  .plant-common {
    font-size: 0.58rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #2d5a3d;
    margin-bottom: 1.8rem;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: #c8c0b0;
    margin-bottom: 1.8rem;
    flex-shrink: 0;
  }

  .plant-note {
    font-size: 1.05rem;
    font-weight: 300;
    line-height: 1.7;
    color: #3a3830;
    font-style: italic;
    margin-bottom: 1.8rem;
  }

  .phenology-tag {
    display: inline-block;
    font-size: 0.52rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #2d5a3d;
    border: 1px solid #2d5a3d;
    padding: 0.3rem 0.8rem;
    width: fit-content;
  }

  .panel-footer {
    padding: 1.2rem 2rem;
    border-top: 1px solid #c8c0b0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .location-text {
    font-size: 0.55rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.1em;
    color: #8a8478;
  }

  .updated-text {
    font-size: 0.5rem;
    font-family: 'Space Mono', monospace;
    color: #c8c0b0;
  }
</style>
</head>
<body>
<div class="layout">

  <div class="image-zone">
    <div class="image-loading" id="loader">
      <div class="spinner"></div>
      <span class="spinner-text">Painting the plant</span>
    </div>
    <img
      src="https://image.pollinations.ai/prompt/Detailed%20botanical%20illustration%20of%20Angelica%20archangelica%2C%20japanese%20woodblock%20ukiyo-e%20style%2C%20fine%20ink%20lines%2C%20muted%20earth%20tones%2C%20aged%20cream%20paper%20background%2C%20full%20plant%20with%20roots%20leaves%20and%20flowers%2C%20no%20text%2C%20no%20labels?width=1920&height=1080&seed=12332&nologo=true&enhance=true"
      alt="Garden Angelica"
      onload="document.getElementById('loader').style.display='none'"
      onerror="document.getElementById('loader').style.display='none'"
    />
  </div>

  <div class="info-panel">
    <div class="panel-header">
      <span class="panel-title">Flora · Today</span>
      <span class="panel-date">10 July 2026</span>
    </div>

    <div class="weather-grid">
      <div class="weather-item">
        <span class="weather-label">Temperature</span>
        <span class="weather-value">10°C</span>
      </div>
      <div class="weather-item">
        <span class="weather-label">Humidity</span>
        <span class="weather-value">83%</span>
      </div>
      <div class="weather-item">
        <span class="weather-label">Condition</span>
        <span class="weather-value">Partly cloudy</span>
      </div>
      <div class="weather-item">
        <span class="weather-label">Season</span>
        <span class="weather-value">Summer</span>
      </div>
    </div>

    <div class="plant-section">
      <div class="plant-latin">Angelica archangelica</div>
      <div class="plant-common">GARDEN ANGELICA</div>
      <div class="divider"></div>
      <div class="plant-note">Unfurling umbels in misty air</div>
      <div class="phenology-tag">Flowering</div>
    </div>

    <div class="panel-footer">
      <span class="location-text">Reykjavik, Iceland</span>
      <span class="updated-text">updated 11:26</span>
    </div>
  </div>

</div>
</body>
</html>
