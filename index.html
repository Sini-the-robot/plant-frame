<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="21600">
<title>Flora · Buenos Aires</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0e0e0c;
    font-family: 'DM Serif Display', Georgia, serif;
    overflow: hidden;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100vw;
    height: 100vh;
    background: #0e0e0c;
  }

  /* TOP BAR */
  .topbar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2.5rem;
    height: 48px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #5a9a6a;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(90,154,106,0.5); }
    50%      { opacity:0.5; box-shadow: 0 0 0 5px rgba(90,154,106,0); }
  }

  .brand {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .clock {
    font-family: 'DM Mono', monospace;
    font-size: 1.3rem;
    font-weight: 300;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
  }

  .topbar-right {
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }

  /* CARD */
  .card {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 900px;
    padding: 1.2rem 0 0;
    overflow: hidden;
  }

  /* IMAGE */
  .image-zone {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #f5f0e6;
    border-radius: 2px;
    margin: 0 1.5rem;
    min-height: 0;
  }

  .image-zone img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
    animation: slowZoom 25s ease-in-out infinite alternate;
  }
  @keyframes slowZoom {
    from { transform: scale(1.0); }
    to   { transform: scale(1.03); }
  }

  .image-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(14,14,12,0.15) 100%);
    pointer-events: none;
  }

  .image-badge {
    position: absolute;
    top: 0.9rem; right: 0.9rem;
    background: rgba(14,14,12,0.5);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 0.3rem 0.75rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.48rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    animation: fadeIn 1s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity:0; transform: translateY(-6px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .image-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem;
    background: #f5f0e6; z-index: 3;
  }
  .leaf-anim { opacity: 0.2; animation: leafFloat 3s ease-in-out infinite; }
  @keyframes leafFloat {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-7px) rotate(4deg); }
  }
  .loading-txt {
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem; letter-spacing: 0.2em;
    color: #9a9080; text-transform: uppercase;
  }

  /* INFO BAR */
  .info-bar {
    flex-shrink: 0;
    background: #f2ece0;
    margin: 0.8rem 1.5rem 1.2rem;
    border-radius: 2px;
    border-top: 2px solid transparent;
    background-clip: padding-box;
    position: relative;
    overflow: hidden;
  }

  .info-bar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #2d5a3d, #8aab7a, #c8a96e, #2d5a3d);
    background-size: 300% 100%;
    animation: shimmer 6s linear infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 100% 0; }
    100% { background-position: -200% 0; }
  }

  .info-grid {
    display: grid;
    grid-template-columns: 180px 1px 1fr 1px 180px;
    padding-top: 2px;
  }

  .div-v {
    background: #ddd8cc;
    margin: 0.9rem 0;
  }

  /* weather */
  .weather-block {
    padding: 0.9rem 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .block-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.44rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #a09880;
  }

  .weather-items {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem 0.8rem;
  }

  .w-item { display: flex; flex-direction: column; gap: 0.05rem; }

  .w-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.4rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: #b8b0a0;
  }

  .w-value {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem; font-weight: 400;
    color: #1a1a18;
    font-variant-numeric: tabular-nums;
  }

  /* plant center */
  .plant-block {
    padding: 0.9rem 1.8rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.2rem;
  }

  .plant-latin {
    font-size: 1.55rem;
    font-style: italic;
    line-height: 1.1;
    color: #1a1a18;
    animation: slideUp 0.7s ease forwards;
  }

  .plant-common {
    font-family: 'DM Mono', monospace;
    font-size: 0.46rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: #2d5a3d;
    margin-bottom: 0.4rem;
    animation: slideUp 0.85s ease forwards;
  }

  .plant-note {
    font-size: 0.78rem; font-style: italic;
    line-height: 1.5; color: #4a4840;
    animation: slideUp 1s ease forwards;
  }

  @keyframes slideUp {
    from { opacity:0; transform: translateY(5px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* trait */
  .trait-block {
    padding: 0.9rem 1.2rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .trait-text {
    font-size: 0.8rem;
    font-style: italic;
    line-height: 1.5;
    color: #5a5248;
    flex: 1;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .quote-mark {
    font-size: 1.8rem;
    line-height: 1;
    color: #c8b898;
    font-style: normal;
    flex-shrink: 0;
    align-self: flex-start;
    margin-top: -0.1rem;
    font-family: Georgia, serif;
  }

  .bottom-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-top: 0.5rem;
  }

  .phenology-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.42rem; letter-spacing: 0.14em;
    text-transform: uppercase; color: #2d5a3d;
    border: 1px solid rgba(45,90,61,0.3);
    padding: 0.2rem 0.6rem;
    background: rgba(45,90,61,0.04);
  }

  .updated-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.4rem; letter-spacing: 0.1em;
    color: #c0b8a8;
  }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="topbar-left">
      <div class="live-dot"></div>
      <span class="brand">Flora · Today</span>
    </div>
    <div class="clock" id="clock">00:00:00</div>
    <div class="topbar-right">10 Jul 2026</div>
  </div>

  <div class="card">

    <div class="image-zone">
      <div class="image-loading" id="loader">
        <svg class="leaf-anim" width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#5a9a6a" stroke-width="1.2">
          <path d="M24 44 C24 44 24 18 24 13 C24 4 35 1 42 7 C42 7 31 13 28 23"/>
          <path d="M24 30 C24 30 17 23 10 23 C3 23 2 31 8 36 C14 41 24 36 24 30"/>
          <line x1="24" y1="44" x2="24" y2="37"/>
        </svg>
        <span class="loading-txt">Painting the season</span>
      </div>
      <img
        src="https://image.pollinations.ai/prompt/Beautiful%20botanical%20illustration%20of%20Lantana%20camara%2C%20japanese%20woodblock%20ukiyo-e%20style%2C%20delicate%20ink%20lines%2C%20soft%20muted%20earth%20tones%2C%20aged%20cream%20paper%2C%20detailed%20flowers%20and%20leaves%2C%20elegant%20composition%2C%20no%20text%2C%20no%20labels%2C%20masterpiece%20quality?width=900&height=900&seed=30898&nologo=true"
        alt="West Indian Lantana"
        onload="document.getElementById('loader').style.display='none'"
        onerror="document.getElementById('loader').style.display='none'"
      />
      <div class="image-overlay"></div>
      <div class="image-badge">Buenos Aires · Argentina</div>
    </div>

    <div class="info-bar">
      <div class="info-grid">

        <div class="weather-block">
          <div class="block-label">Conditions</div>
          <div class="weather-items">
            <div class="w-item">
              <span class="w-label">Temp</span>
              <span class="w-value">9°C</span>
            </div>
            <div class="w-item">
              <span class="w-label">Humidity</span>
              <span class="w-value">92%</span>
            </div>
            <div class="w-item">
              <span class="w-label">Sky</span>
              <span class="w-value" style="font-size:0.68rem">Partly cloudy</span>
            </div>
            <div class="w-item">
              <span class="w-label">Season</span>
              <span class="w-value" style="font-size:0.68rem">Winter</span>
            </div>
          </div>
        </div>

        <div class="div-v"></div>

        <div class="plant-block">
          <div class="plant-latin">Lantana camara</div>
          <div class="plant-common">WEST INDIAN LANTANA</div>
          <div class="plant-note">Fragrant blooms fade slowly</div>
        </div>

        <div class="div-v"></div>

        <div class="trait-block">
          <div class="block-label">Unique trait</div>
          <div class="trait-text">
            <span class="quote-mark">"</span>
            Delicate clustered flowers
          </div>
          <div class="bottom-row">
            <div class="phenology-tag">Dormant</div>
            <span class="updated-tag">11:53</span>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
  function tick() {
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0');
    const m = String(n.getMinutes()).padStart(2,'0');
    const s = String(n.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = h+':'+m+':'+s;
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
