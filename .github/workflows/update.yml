name: Update Florae

on:
  schedule:
    - cron: '0 */2 * * *'  # هر ۲ ساعت
  workflow_dispatch:        # دستی هم بشه اجرا کرد

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Florae
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python plant_frame.py

      - name: Commit and push
        run: |
          git config user.email "florae@github.com"
          git config user.name "Florae Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "florae: auto update"
          git push
